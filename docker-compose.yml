services:
  qcontrol:
    build: .
    container_name: qcontrol
    restart: unless-stopped
    environment:
      QCONTROL_TOKEN: ${QCONTROL_TOKEN:?set in .env}
      HOST_OPT: /host/opt
      # Real path on the docker host. We mount /opt → /host/opt below; any
      # `docker run -v` we shell out to needs the host's view (/opt).
      HOST_OPT_REAL: /opt
      PORT: 8089
    volumes:
      # Docker socket — qcontrol shells out to the host's docker CLI through this.
      - /var/run/docker.sock:/var/run/docker.sock
      # The host's /opt directory, where every project lives. Read-write so
      # the reverse-proxy editor + (future) staging-clone can update files.
      - /opt:/host/opt
      # Host /proc, read-only — so the VPS Health page can read host RAM,
      # loadavg, uptime, and per-process CPU/mem from the actual host
      # rather than the container's namespaced view.
      - /proc:/host/proc:ro
    ports:
      - "8089:8089"
